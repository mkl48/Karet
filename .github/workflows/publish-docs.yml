# builds the Moonwave docs and publishes them to the gh-pages branch on every push to master.
# enable GitHub Pages for this repo with source = gh-pages branch once this has run once.
name: publish-docs
on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish docs to GitHub Pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm i -g moonwave@latest
      - name: Publish
        # --code scopes the API extraction to first-party modules. the vendored deps (Iris,
        # Switch, Substance, Pik, Highlighter) live under src/ too and aren't Moonwave-annotated,
        # so scanning them would break the build. add a path here when you annotate a new module.
        run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "github-actions-bot"
          moonwave build --publish \
            --code src/init.luau \
            --code src/Theme \
            --code src/Context \
            --code src/Registry \
            --code src/Terminal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
