[package]
name = "kr3ative/karet"
version = "0.1.0"
description = "An in-game command framework and terminal for Roblox"
license = "MIT"
authors = ["kr3ative"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
# Switch, Substance, and Iris are VENDORED under src/ (src/Switch, src/Substance, src/Iris),
# so they ship with Karet by default - no install needed. Uncomment to use Wally-managed
# copies instead (and delete the vendored folders so deps.luau doesn't shadow them).
# Switch = "ker/switch@0.1.0"        # input detection - client-only
# Substance = "ker/substance@0.1.0"  # networking - client/server transport
# Iris = "sirmallard/iris@2.5.1"     # immediate-mode UI (Kaveat)
